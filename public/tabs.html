<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start POS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
          sans-serif;
        background: #e8e8e8;
      }

      /* ── Tab bar ── */
      #tabbar {
        display: flex;
        align-items: flex-end;
        height: 36px;
        background: #d8d8d8;
        border-bottom: 1px solid #b0b0b0;
        padding: 4px 6px 0 6px;
        gap: 2px;
        overflow-x: auto;
        overflow-y: hidden;
        user-select: none;
        -webkit-user-select: none;
        flex-shrink: 0;
      }

      #tabbar::-webkit-scrollbar {
        height: 0;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 0 8px 0 10px;
        height: 28px;
        border-radius: 6px 6px 0 0;
        cursor: pointer;
        min-width: 90px;
        max-width: 210px;
        flex-shrink: 0;
        background: #c8c8c8;
        color: #555;
        font-size: 12px;
        border: 1px solid transparent;
        border-bottom: none;
        position: relative;
        transition:
          background 0.12s,
          color 0.12s;
      }

      .tab:hover {
        background: #d0d0d0;
        color: #333;
      }

      .tab.active {
        background: #f5f5f5;
        color: #111;
        border-color: #b0b0b0;
        z-index: 1;
      }

      .tab-favicon {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.7;
      }

      .tab.active .tab-favicon {
        opacity: 1;
      }

      .tab-title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
      }

      .tab-close {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        line-height: 1;
        flex-shrink: 0;
        opacity: 0;
        transition:
          opacity 0.12s,
          background 0.12s;
        color: #666;
      }

      .tab:hover .tab-close,
      .tab.active .tab-close {
        opacity: 1;
      }

      .tab-close:hover {
        background: rgba(0, 0, 0, 0.15);
        color: #111;
      }

      /* New tab button */
      #new-tab-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 5px;
        cursor: pointer;
        color: #666;
        font-size: 20px;
        font-weight: 300;
        flex-shrink: 0;
        margin-bottom: 2px;
        transition:
          background 0.12s,
          color 0.12s;
      }

      #new-tab-btn:hover {
        background: rgba(0, 0, 0, 0.12);
        color: #111;
      }

      /* ── Frames container ── */
      #frames {
        position: absolute;
        top: 36px;
        left: 0;
        right: 0;
        bottom: 0;
      }

      iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        border: none;
        background: #fff;
      }

      /* Loading indicator shown while iframe loads */
      .frame-loading {
        position: absolute;
        width: 100%;
        height: 100%;
        display: none;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        z-index: 10;
      }

      .frame-loading.visible {
        display: flex;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #ddd;
        border-top-color: #666;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="tabbar">
      <div id="new-tab-btn" title="New Tab (⌘T)">+</div>
    </div>
    <div id="frames"></div>

    <script>
      const BASE_URL = "http://localhost:2003/";

      /* ── Pathname → display name map ── */
      const PATH_NAMES = {
        "/dashboard/analytics": "Analytics",
        "/dashboard/sales": "Sales",
        "/dashboard/salesreturn": "Sales Return",
        "/dashboard/sales-payments": "Sales Payments",
        "/dashboard/sales-return-payments": "Sales Return Payments",
        "/dashboard/sales-cash-discounts": "Sales Cash Discounts",
        "/dashboard/purchases": "Purchases",
        "/dashboard/purchasereturn": "Purchase Return",
        "/dashboard/purchase-payments": "Purchase Payments",
        "/dashboard/purchase-return-payments": "Purchase Return Payments",
        "/dashboard/purchase-cash-discounts": "Purchase Cash Discounts",
        "/dashboard/quotations": "Quotations",
        "/dashboard/quotation_sales_returns": "Quotation Sales Returns",
        "/dashboard/delivery-notes": "Delivery Notes",
        "/dashboard/stock-transfers": "Stock Transfers",
        "/dashboard/stats": "Stats",
        "/dashboard/customers": "Customers",
        "/dashboard/vendors": "Vendors",
        "/dashboard/products": "Products",
        "/dashboard/product_category": "Product Category",
        "/dashboard/product_brand": "Product Brand",
        "/dashboard/stores": "Stores",
        "/dashboard/warehouses": "Warehouses",
        "/dashboard/expenses": "Expenses",
        "/dashboard/expense_category": "Expense Category",
        "/dashboard/receivables": "Receivables",
        "/dashboard/payables": "Payables",
        "/dashboard/capitals": "Capitals",
        "/dashboard/capital_withdrawals": "Capital Withdrawals",
        "/dashboard/dividents": "Dividends",
        "/dashboard/users": "Users",
        "/dashboard/signatures": "Signatures",
        "/dashboard/ledger": "Ledger",
        "/dashboard/accounts": "Accounts",
        "/dashboard/postings": "Postings",
      };

      function nameFromPath(pathname) {
        // Exact match first, then prefix match (longest wins)
        if (PATH_NAMES[pathname]) return PATH_NAMES[pathname];
        let best = null,
          bestLen = 0;
        for (const [k, v] of Object.entries(PATH_NAMES)) {
          if (pathname.startsWith(k) && k.length > bestLen) {
            best = v;
            bestLen = k.length;
          }
        }
        return best || "Start POS";
      }

      let tabs = [];
      let activeTabId = null;
      let nextId = 1;

      // Track last-seen pathname per tab to avoid redundant DOM writes
      const lastPath = {};

      /* ── helpers ── */
      function tabEl(id) {
        return document.querySelector(`.tab[data-id="${id}"]`);
      }
      function frameEl(id) {
        return document.querySelector(`iframe[data-id="${id}"]`);
      }

      /* ── create tab ── */
      function createTab(url) {
        url = url || BASE_URL;
        const id = nextId++;
        tabs.push({ id, title: "Start POS" });

        // DOM: tab pill
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.dataset.id = id;
        tab.innerHTML =
          `<svg class="tab-favicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">` +
          `<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>` +
          `<span class="tab-title">Start POS</span>` +
          `<span class="tab-close" title="Close Tab (⌘W)">&#xd7;</span>`;

        tab.addEventListener("mousedown", (e) => {
          if (e.target.classList.contains("tab-close")) {
            e.stopPropagation();
            closeTab(id);
          } else {
            switchTab(id);
          }
        });

        // Insert before + button
        document
          .getElementById("tabbar")
          .insertBefore(tab, document.getElementById("new-tab-btn"));

        // DOM: iframe + loading overlay
        const wrapper = document.createElement("div");
        wrapper.style.cssText =
          "position:absolute;width:100%;height:100%;visibility:hidden;pointer-events:none;z-index:0";
        wrapper.dataset.id = id;

        const loading = document.createElement("div");
        loading.className = "frame-loading visible";
        loading.innerHTML = '<div class="spinner"></div>';

        const frame = document.createElement("iframe");
        frame.dataset.id = id;
        frame.src = url;
        frame.setAttribute(
          "allow",
          "downloads; autoplay; clipboard-write; geolocation",
        );

        frame.addEventListener("load", () => {
          loading.classList.remove("visible");
          syncTitle(id, frame);
          watchTitle(id, frame);
        });

        wrapper.appendChild(loading);
        wrapper.appendChild(frame);
        document.getElementById("frames").appendChild(wrapper);

        switchTab(id);
        return id;
      }

      /* ── title sync via pathname polling ── */
      function syncTitle(id, frame) {
        try {
          const pathname = frame.contentWindow.location.pathname;
          if (lastPath[id] === pathname) return;
          lastPath[id] = pathname;
          updateTabTitle(id, nameFromPath(pathname));
        } catch (_) {
          /* cross-origin guard */
        }
      }

      function watchTitle(id, frame) {
        // Poll the iframe's pathname every 500 ms to catch SPA navigation
        setInterval(() => syncTitle(id, frame), 500);
      }

      function updateTabTitle(id, title) {
        const idx = tabs.findIndex((t) => t.id === id);
        if (idx >= 0) tabs[idx].title = title;
        const el = tabEl(id);
        if (el)
          el.querySelector(".tab-title").textContent = title || "Start POS";
      }

      /* ── switch tab ── */
      function switchTab(id) {
        activeTabId = id;

        document
          .querySelectorAll(".tab")
          .forEach((el) =>
            el.classList.toggle("active", parseInt(el.dataset.id) === id),
          );

        let targetFrame = null;
        document.querySelectorAll("#frames > div").forEach((wrapper) => {
          const active = parseInt(wrapper.dataset.id) === id;
          // Toggle the wrapper — visibility keeps the iframe live in the render
          // tree (preserving scroll/state) while pointer-events:none ensures
          // inactive wrappers never intercept clicks meant for the active tab.
          wrapper.style.visibility = active ? "visible" : "hidden";
          wrapper.style.pointerEvents = active ? "auto" : "none";
          wrapper.style.zIndex = active ? "1" : "0";
          if (active) targetFrame = wrapper.querySelector("iframe");
        });

        if (targetFrame) {
          // Focus the iframe element, then its content window.
          // Both calls are needed for reliable focus in WebKit.
          try {
            targetFrame.focus();
          } catch (_) {}
          setTimeout(() => {
            try {
              targetFrame.contentWindow.focus();
            } catch (_) {}
          }, 0);
        }
      }

      /* ── close tab ── */
      function closeTab(id) {
        if (tabs.length <= 1) {
          // Last tab: close the whole window
          try {
            if (window.__TAURI__) {
              window.__TAURI__.core
                .invoke("close_main_window")
                .catch(() => window.close());
            } else {
              window.close();
            }
          } catch (_) {
            window.close();
          }
          return;
        }

        const idx = tabs.findIndex((t) => t.id === id);
        tabs = tabs.filter((t) => t.id !== id);

        tabEl(id)?.remove();
        // Remove the wrapper div
        document.querySelector(`#frames > div[data-id="${id}"]`)?.remove();

        if (activeTabId === id) {
          const next = tabs[Math.min(idx, tabs.length - 1)];
          if (next) switchTab(next.id);
        }
      }

      /* ── keyboard shortcuts ── */
      document.addEventListener("keydown", (e) => {
        if (e.metaKey && e.key === "t") {
          e.preventDefault();
          createTab();
        } else if (e.metaKey && e.key === "w") {
          e.preventDefault();
          if (activeTabId !== null) closeTab(activeTabId);
        } else if (e.metaKey && (e.key === "[" || e.key === "ArrowLeft")) {
          // Cmd+[ or Cmd+Left → previous tab
          const idx = tabs.findIndex((t) => t.id === activeTabId);
          if (idx > 0) switchTab(tabs[idx - 1].id);
        } else if (e.metaKey && (e.key === "]" || e.key === "ArrowRight")) {
          // Cmd+] or Cmd+Right → next tab
          const idx = tabs.findIndex((t) => t.id === activeTabId);
          if (idx < tabs.length - 1) switchTab(tabs[idx + 1].id);
        }
      });

      document
        .getElementById("new-tab-btn")
        .addEventListener("click", () => createTab());

      /* ── init ── */
      createTab();
    </script>
  </body>
</html>
